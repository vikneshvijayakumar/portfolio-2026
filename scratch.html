<!DOCTYPE html>
<html>
<head>
<style>
body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #fafafa; }
.sticker {
  position: relative;
  width: 112px;
  height: 112px;
  margin: 0 auto;
}

.sticker__disc {
  width: 112px;
  height: 112px;
  border-radius: 50%;
  overflow: hidden;
  -webkit-mask-image: linear-gradient(-135deg, transparent 16px, black 16px);
  mask-image: linear-gradient(-135deg, transparent 16px, black 16px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
  background: #2e4a3e; /* Mock image color */
}

.sticker::before {
  content: '';
  display: block;
  background: white;
  width: 44px;
  height: 14px;
  border-top-left-radius: 0;
  border-top-right-radius: 0;
  border-bottom-left-radius: 50% 100%;
  border-bottom-right-radius: 50% 100%;
  transform-origin: top right;
  transform: rotate(-45deg);
  position: absolute;
  top: 11px;
  right: -6px;
  box-shadow:
    inset 2px 2px 2px rgba(0, 0, 0, 0.05),
    4px 4px 6px rgba(0, 0, 0, 0.1),
    1px 1px 3px rgba(0, 0, 0, 0.15);
  z-index: 10;
}
</style>
</head>
<body>
  <div class="sticker">
    <div class="sticker__disc"></div>
  </div>
</body>
</html>
